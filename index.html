<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>قسمة ونصيب - الملكي</title>
<style>
    * { box-sizing: border-box; }
    body {
        margin: 0;
        padding: 0;
        background: radial-gradient(circle, #1a1508 0%, #0d0d0d 100%) !important;
        font-family: 'Segoe UI', Tahoma, sans-serif;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        color: white;
        overflow: hidden;
        position: relative;
    }
    
    /* تنسيق المراحل التمهيدية للأسئلة */
    .step-container {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 20px;
        z-index: 100;
        transition: all 0.5s ease;
    }
    .step-title {
        font-size: 28px;
        font-weight: bold;
        color: #f3e5ab;
        margin-bottom: 30px;
        text-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        line-height: 1.5;
    }
    .step-btn {
        background: linear-gradient(45deg, #aa7c11, #d4af37, #f3e5ab);
        color: #000;
        border: 1px solid #aa7c11;
        padding: 14px 50px;
        font-size: 20px;
        font-weight: bold;
        border-radius: 50px;
        cursor: pointer;
        box-shadow: 0 8px 25px rgba(212, 175, 55, 0.3);
        transition: transform 0.2s;
    }
    .step-btn:active { transform: scale(0.95); }

    /* إخفاء العناصر افتراضياً */
    .hidden {
        display: none !important;
    }

    /* تنسيقات واجهة البطاقة (المرحلة الثالثة) */
    .title {
        font-size: 36px;
        font-weight: 900;
        color: #d4af37;
        margin-bottom: 25px;
        text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
        animation: pulse 2.5s infinite ease-in-out;
        z-index: 99;
    }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }
    
    .card {
        position: relative;
        width: 340px;
        height: 210px;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.9), 0 0 25px rgba(212, 175, 55, 0.2);
        border: 3px solid #d4af37;
        background: linear-gradient(135deg, #f3e5ab 0%, #d4af37 50%, #aa7c11 100%);
        z-index: 99;
    }
    
    .result {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 20px;
        font-size: 24px;
        font-weight: bold;
        color: #111;
        background: linear-gradient(135deg, #ffffff 0%, #f7e7bd 100%);
    }
    
    canvas {
        position: absolute;
        top: 0; left: 0;
        cursor: crosshair;
        touch-action: none;
        z-index: 100;
    }

    .btn-container {
        margin-top: 25px;
        height: 55px;
        z-index: 99;
    }
    .next-btn {
        display: none;
        background: linear-gradient(45deg, #aa7c11, #d4af37, #f3e5ab);
        color: #000;
        border: 1px solid #aa7c11;
        padding: 12px 40px;
        font-size: 18px;
        font-weight: bold;
        border-radius: 50px;
        cursor: pointer;
        box-shadow: 0 8px 20px rgba(212, 175, 55, 0.3);
        transition: all 0.2s ease;
    }
    .next-btn:active { transform: scale(0.96); }

    .popup-overlay {
        display: none;
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0, 0, 0, 0.85);
        backdrop-filter: blur(5px);
        justify-content: center;
        align-items: center;
        z-index: 9999;
        padding: 20px;
    }
    .popup-box {
        background: #141414;
        color: #f3e5ab;
        width: 100%;
        max-width: 380px;
        padding: 30px 20px;
        border-radius: 20px;
        text-align: center;
        box-shadow: 0 20px 50px rgba(0,0,0,0.6), 0 0 25px rgba(212, 175, 55, 0.3);
        border: 2px solid #d4af37;
    }
    .popup-box h3 { color: #d4af37; margin-top: 0; font-size: 22px; }
    .popup-box p { font-size: 16px; line-height: 1.7; color: #e5dcc5; margin-bottom: 25px; }
    .close-btn {
        background: linear-gradient(45deg, #aa7c11, #d4af37);
        color: #000;
        border: none;
        padding: 10px 30px;
        font-size: 16px;
        font-weight: bold;
        border-radius: 10px;
        cursor: pointer;
    }

    .heart {
        position: fixed;
        top: -10%;
        font-size: 24px;
        animation: fall linear forwards;
        z-index: 1;
        pointer-events: none;
    }
    @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
</style>
</head>
<body>

<audio id="bgMusic" loop playsinline preload="auto">
  <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- الخطوة الأولى: التحقق من الاسم -->
<div class="step-container" id="step1">
    <div class="step-title">هل أنت حسين هادي مناحي؟</div>
    <button class="step-btn" onclick="goToStep2()">نعم</button>
</div>

<!-- الخطوة الثانية: الجاهزية لمعرفة النتيجة -->
<div class="step-container hidden" id="step2">
    <div class="step-title">هل أنت جاهز لمعرفة هل تم قبولك بالبرنامج؟</div>
    <button class="step-btn" onclick="revealScratchCard()">أنا جاهز</button>
</div>

<!-- الخطوة الثالثة: واجهة بطاقة الخدش (مخفية في البداية) -->
<div class="title hidden" id="mainTitle">💛 قسمة ونصيب 💛</div>

<div class="card hidden" id="mainCard">
  <div class="result">
    🎉 مبروك! تم قبولك في البرنامج 🎉
  </div>
  <canvas id="scratch"></canvas>
</div>

<div class="btn-container">
    <button class="next-btn" id="nextBtn" onclick="showMessage()">متابعة</button>
</div>

<div class="popup-overlay" id="msgPopup">
    <div class="popup-box">
        <h3>إشعار هام ✈️</h3>
        <p>سوف يتم استحصال تأشيرة سفرك إلى تركيا بتاريخ 7/2 وسوف يتم تواصل مع فريق مختص التأشيرات لأعطائك التعليمات متبقية وشكراً لصبرك فريق برنامج قسمة ونصيب</p>
        <button class="close-btn" onclick="closeMessage()">حسنًا</button>
    </div>
</div>

<script>
const bgMusic = document.getElementById('bgMusic');

function goToStep2() {
    document.getElementById('step1').classList.add('hidden');
    document.getElementById('step2').classList.remove('hidden');
    playAudioSecurely(); // محاولة أولية لتجهيز تشغيل الصوت عبر اللمس
}

function revealScratchCard() {
    document.getElementById('step2').classList.add('hidden');
    document.getElementById('mainTitle').classList.remove('hidden');
    document.getElementById('mainCard').classList.remove('hidden');
    playAudioSecurely(); // تأكيد تفعيل الصوت تمهيداً لبدء الحك
    initScratchCard();
}

function playAudioSecurely() {
    if (bgMusic && bgMusic.paused) {
        bgMusic.load();
        let playPromise = bgMusic.play();
        if (playPromise !== undefined) {
            playPromise.then(() => {}).catch(() => {});
        }
    }
}

function initScratchCard() {
    const canvas = document.getElementById('scratch');
    const ctx = canvas.getContext('2d');
    const nextBtn = document.getElementById('nextBtn');

    canvas.width = 340;
    canvas.height = 210;

    ctx.fillStyle = '#111111';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = '#d4af37';
    ctx.font = 'bold 20px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('اخدش هنا لكشف النتيجة', 170, 105);

    let erasedPixels = 0;
    let isScratched = false;
    let heartInterval;

    function createHeart() {
        const heart = document.createElement('div');
        heart.classList.add('heart');
        const hearts = ['💛', '✨', '💖', '👑'];
        heart.innerText = hearts[Math.floor(Math.random() * hearts.length)];
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.animationDuration = Math.random() * 2 + 3 + "s";
        heart.style.opacity = Math.random();
        heart.style.fontSize = Math.random() * 15 + 15 + "px";
        document.body.appendChild(heart);
        setTimeout(() => { heart.remove(); }, 5000);
    }

    function startEffects() {
        playAudioSecurely();
        if (!isScratched) {
            isScratched = true;
            heartInterval = setInterval(createHeart, 300);
        }
    }

    function scratch(x, y) {
        startEffects();
        ctx.globalCompositeOperation = 'destination-out';
        ctx.beginPath();
        ctx.arc(x, y, 25, 0, Math.PI * 2);
        ctx.fill();
        
        erasedPixels++;
        if (erasedPixels > 30 && nextBtn.style.display !== 'block') {
            nextBtn.style.display = 'block';
        }
    }

    let isDrawing = false;
    canvas.addEventListener('mousedown', () => { isDrawing = true; playAudioSecurely(); });
    canvas.addEventListener('mouseup', () => isDrawing = false);
    canvas.addEventListener('mousemove', e => {
        if (!isDrawing) return;
        const r = canvas.getBoundingClientRect();
        scratch(e.clientX - r.left, e.clientY - r.top);
    });

    canvas.addEventListener('touchstart', () => { playAudioSecurely(); });
    canvas.addEventListener('touchmove', e => {
        const r = canvas.getBoundingClientRect();
        const t = e.touches[0];
        scratch(t.clientX - r.left, t.clientY - r.top);
        e.preventDefault();
    }, { passive: false });
}

// مستمع احتياطي إضافي لتفاعل الصوت الشامل
document.addEventListener('touchstart', playAudioSecurely, { once: true });
document.addEventListener('click', playAudioSecurely, { once: true });

function showMessage() {
    document.getElementById('msgPopup').style.display = 'flex';
}

function closeMessage() {
    document.getElementById('msgPopup').style.display = 'none';
}
</script>

</body>
</html>
