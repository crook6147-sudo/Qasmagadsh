<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>قسمة ونصيب - فخامة</title>
<style>
    body {
        margin: 0;
        background: radial-gradient(circle, #1a1508 0%, #0d0d0d 100%);
        font-family: 'Segoe UI', Tahoma, sans-serif;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        color: white;
        overflow: hidden;
        position: relative;
    }
    
    .title {
        font-size: 38px;
        font-weight: 900;
        color: #d4af37;
        margin-bottom: 30px;
        text-shadow: 0 0 25px rgba(212, 175, 55, 0.6);
        letter-spacing: 1px;
        animation: pulse 2.5s infinite ease-in-out;
        z-index: 10;
    }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }
    
    .card {
        position: relative;
        width: 350px;
        height: 210px;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.8), 0 0 30px rgba(212, 175, 55, 0.2);
        border: 3px solid #d4af37;
        background: linear-gradient(135deg, #f3e5ab 0%, #d4af37 50%, #aa7c11 100%);
        z-index: 10;
    }
    
    .result {
        position: absolute;
        inset: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 25px;
        font-size: 26px;
        font-weight: bold;
        color: #111;
        text-shadow: 0 1px 2px rgba(255,255,255,0.4);
        background: linear-gradient(135deg, #ffffff 0%, #f7e7bd 100%);
    }
    
    canvas {
        position: absolute;
        inset: 0;
        cursor: crosshair;
        touch-action: none;
    }

    .btn-container {
        margin-top: 30px;
        height: 55px;
        z-index: 10;
    }
    .next-btn {
        display: none;
        background: linear-gradient(45deg, #aa7c11, #d4af37, #f3e5ab);
        color: #000;
        border: 1px solid #aa7c11;
        padding: 14px 45px;
        font-size: 18px;
        font-weight: bold;
        border-radius: 50px;
        cursor: pointer;
        box-shadow: 0 8px 20px rgba(212, 175, 55, 0.3);
        transition: all 0.3s ease;
        animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .next-btn:active { transform: scale(0.96); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

    .popup-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.85);
        backdrop-filter: blur(5px);
        justify-content: center;
        align-items: center;
        z-index: 1000;
        padding: 20px;
    }
    .popup-box {
        background: #141414;
        color: #f3e5ab;
        width: 100%;
        max-width: 400px;
        padding: 35px 25px;
        border-radius: 20px;
        text-align: center;
        box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 25px rgba(212, 175, 55, 0.2);
        border: 2px solid #d4af37;
        animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.15);
    }
    .popup-box h3 { color: #d4af37; margin-top: 0; font-size: 24px; font-weight: bold; }
    .popup-box p { font-size: 16px; line-height: 1.7; color: #e5dcc5; margin-bottom: 30px; }
    .close-btn {
        background: linear-gradient(45deg, #aa7c11, #d4af37);
        color: #000;
        border: none;
        padding: 10px 30px;
        font-size: 16px;
        font-weight: bold;
        border-radius: 10px;
        cursor: pointer;
        transition: opacity 0.2s;
    }
    .close-btn:active { opacity: 0.8; }
    @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    .heart {
        position: fixed;
        top: -10%;
        font-size: 24px;
        animation: fall linear forwards;
        z-index: 1;
        pointer-events: none;
    }
    @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
</style>
</head>
<body>

<!-- تم تعديل المسار ليعتمد على الاسم المبسط والآمن للأغنية -->
<audio id="bgMusic" loop playsinline preload="auto">
  <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="title">💛 قسمة ونصيب 💛</div>

<div class="card">
  <div class="result">
    🎉 مبروك! تم قبولك في البرنامج 🎉
  </div>
  <canvas id="scratch"></canvas>
</div>

<div class="btn-container">
    <button class="next-btn" id="nextBtn" onclick="showMessage()">متابعة</button>
</div>

<div class="popup-overlay" id="msgPopup">
    <div class="popup-box">
        <h3>إشعار هام ✈️</h3>
        <p>سوف يتم استحصال تأشيرة سفرك إلى تركيا بتاريخ 7/2 وسوف يتم تواصل مع فريق مختص التأشيرات لأعطائك التعليمات متبقية وشكراً لصبرك فريق برنامج قسمة ونصيب</p>
        <button class="close-btn" onclick="closeMessage()">حسنًا</button>
    </div>
</div>

<script>
const canvas = document.getElementById('scratch');
const ctx = canvas.getContext('2d');
const nextBtn = document.getElementById('nextBtn');
const bgMusic = document.getElementById('bgMusic');

canvas.width = 350;
canvas.height = 210;

ctx.fillStyle = '#111111';
ctx.fillRect(0, 0, canvas.width, canvas.height);

ctx.fillStyle = '#d4af37';
ctx.font = 'bold 22px Arial';
ctx.textAlign = 'center';
ctx.fillText('اخدش هنا لكشف النتيجة', 175, 115);

let erasedPixels = 0;
let isScratched = false;

function createHeart() {
    const heart = document.createElement('div');
    heart.classList.add('heart');
    
    const hearts = ['💛', '✨', '💖', '👑'];
    heart.innerText = hearts[Math.floor(Math.random() * hearts.length)];
    
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = Math.random() * 2 + 3 + "s";
    heart.style.opacity = Math.random();
    heart.style.fontSize = Math.random() * 15 + 15 + "px";
    
    document.body.appendChild(heart);
    
    setTimeout(() => { heart.remove(); }, 5000);
}

let heartInterval;

function playAudioSecurely() {
    if (bgMusic.paused) {
        bgMusic.load();
        let playPromise = bgMusic.play();
        
        if (playPromise !== undefined) {
            playPromise.then(() => {
                console.log("تم تشغيل الصوت بنجاح!");
            }).catch(err => {
                console.log("تخطي حظر الصوت:", err);
            });
        }
    }
}

function startEffects() {
    playAudioSecurely();
    if (!isScratched) {
        isScratched = true;
        heartInterval = setInterval(createHeart, 300);
    }
}

function scratch(x, y) {
    startEffects();
    ctx.globalCompositeOperation = 'destination-out';
    ctx.beginPath();
    ctx.arc(x, y, 25, 0, Math.PI * 2);
    ctx.fill();
    
    erasedPixels++;
    if (erasedPixels > 40 && nextBtn.style.display !== 'block') {
        nextBtn.style.display = 'block';
    }
}

let isDrawing = false;
canvas.addEventListener('mousedown', () => {
    isDrawing = true;
    playAudioSecurely(); 
});
canvas.addEventListener('mouseup', () => isDrawing = false);
canvas.addEventListener('mousemove', e => {
    if (!isDrawing) return;
    const r = canvas.getBoundingClientRect();
    scratch(e.clientX - r.left, e.clientY - r.top);
});

canvas.addEventListener('touchstart', () => { playAudioSecurely(); });
canvas.addEventListener('touchmove', e => {
    const r = canvas.getBoundingClientRect();
    const t = e.touches[0];
    scratch(t.clientX - r.left, t.clientY - r.top);
    e.preventDefault();
}, { passive: false });

document.addEventListener('touchstart', playAudioSecurely, { once: true });
document.addEventListener('click', playAudioSecurely, { once: true });

function showMessage() {
    document.getElementById('msgPopup').style.display = 'flex';
}

function closeMessage() {
    document.getElementById('msgPopup').style.display = 'none';
}
</script>

</body>
</html>
